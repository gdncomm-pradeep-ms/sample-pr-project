name: Inject JIRA Link

on:
  pull_request:
    types: [opened]

jobs:
  inject-jira-link:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Extract JIRA ticket from branch name
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          TICKET=$(echo "$BRANCH" | grep -oE 'SEA-[0-9]+' | head -1)
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT

      - name: Inject JIRA link into PR body
        if: steps.extract.outputs.ticket != ''
        uses: actions/github-script@v7
        with:
          script: |
            const ticket = '${{ steps.extract.outputs.ticket }}';
            const jiraBase = 'https://gdncomm.atlassian.net/browse';
            const jiraLink = `[${ticket}](${jiraBase}/${ticket})`;
            const regressionLink = `[${ticket} Regression](${jiraBase}/${ticket})`;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const updatedBody = pr.body
              .replace('<!-- JIRA_LINK -->', jiraLink)
              .replace('<!-- JIRA_REGRESSION -->', regressionLink);

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: updatedBody,
            });
